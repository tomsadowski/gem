init_url  = "gemini://geminiprotocol.net/"
#init_url = "gemini://medusae.space"
#init_url = "gemini://datapulp.smol.pub/"



[layout]
scroll_at = 6
x_page      = 2
y_margin    = 2
list_prefix = " - "

background = "202020" 
border     = "706050"
banner     = "706050"
dialog     = "c0b090"

[badlink]
fg = "706050"

[text]
fg = "c0b090"

[list]
fg = "c0b090"

[preformat]
fg = "70a070"

[link]
fg = "90a0d0"

[quote]
fg = "70a070"

[heading1]
fg = "d06060"

[heading2]
fg = "d06060"

[heading3]
fg = "d06060"


[keys]
global    = "g"
msg_view  = "m"
tab_view  = "t"
load_usr  = "l"

move_up      = "o"
move_down    = "i"
move_left    = "e"
move_right   = "n"
cycle_left   = "left"
cycle_right  = "right"
inspect      = "space"
delete_tab   = "d"
new_tab      = "t"

yes          = "y"
no           = "n"
ack          = "enter"
cancel       = "esc"
