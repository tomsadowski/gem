init_url  = "gemini://geminiprotocol.net/"
#init_url = "gemini://medusae.space"
#init_url = "gemini://datapulp.smol.pub/"

scroll_at = 6

[colors]

# black
background = "202020" 
# dyellow
border     = "706050"
badlink    = "706050"
banner     = "706050"
# yellow
text       = "c0b090"
list       = "c0b090"
dialog     = "c0b090"
# cyan
link       = "90a0d0"
# green
preformat  = "70a070"
quote      = "70a070"
# red
heading1   = "d06060"
heading2   = "d06060"
heading3   = "d06060"

[format]
x_margin    = 12
y_margin    = 2
list_prefix = " - "
heading1    = [1, 1]
heading2    = [1, 1]
heading3    = [1, 1]

[keys]
global    = "g"
msg_view  = "m"
tab_view  = "t"
load_cfg  = "c"

move_up      = "o"
move_down    = "i"
move_left    = "e"
move_right   = "n"
cycle_left   = "E"
cycle_right  = "N"
inspect      = "w"
delete_tab   = "v"
new_tab      = "p"

ack          = "y"
yes          = "y"
no           = "n"
